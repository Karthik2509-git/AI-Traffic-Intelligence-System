# ═══════════════════════════════════════════════════════════════════
# AI Traffic Intelligence System — Master Configuration
# ═══════════════════════════════════════════════════════════════════

# ── Model Settings ──────────────────────────────────────────────────
model:
  name: yolov8m.pt             # Options: yolov8n / s / m / l / x
  inference_size: 640          # Standard resolution (px)
  device: ""                   # "" for auto-detect (CPU/GPU)

# ── Detection & ROI ────────────────────────────────────────────────
detection:
  confidence_threshold: 0.40   # Minimum box confidence (0-1)
  iou_threshold: 0.45          # NMS overlap threshold
  frame_skip: 1                # Process every N-th frame (1 = all)
  
  # Regions of Interest (ROI) / Lane Definitions
  # Each lane is defined by a list of [x, y] vertices.
  # If empty, full-frame analysis is used.
  lanes: []
  # Example: 
  # lanes:
  #   - name: "Main Lane"
  #     polygon: [[100, 100], [1100, 100], [1100, 600], [100, 600]]

# ── Multi-Object Tracking ──────────────────────────────────────────
tracking:
  max_age: 5                   # Frames a track stays alive without matches
  min_hits: 3                  # Confirmations before reporting track
  iou_threshold: 0.30          # Tracking-to-detection IoU match threshold
  label_smoothing_window: 15    # Window for stable class identification

# ── Analytics & Heuristics ─────────────────────────────────────────
analytics:
  ema_alpha: 0.20              # Flow smoothing factor (0.0 to 1.0)
  pixels_per_meter: 8.0        # Camera calibration (measure for speed)
  speed_limit_kmh: 80.0        # Violation alert threshold
  congestion_threshold: 80.0   # Score for "Critical" state alerts

# ── Output & Reporting ─────────────────────────────────────────────
output:
  directory: output/
  save_annotated_video: true
  generate_report: true        # Save performance_report.txt on exit
  save_visual_samples: true    # Save detection & heatmap images
  log_level: INFO              # DEBUG / INFO / WARNING / ERROR

# ── Database ───────────────────────────────────────────────────────
database:
  enabled: true
  path: output/traffic.db      # SQLite persistence for long-term trends

# ── ML Prediction ──────────────────────────────────────────────────
prediction:
  min_train_frames: 100        # Data accumulation before forecasting
  retrain_every: 500           # Retraining frequency (processed frames)
  model_path: output/congestion_model.joblib
