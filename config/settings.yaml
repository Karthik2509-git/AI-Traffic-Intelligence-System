# ═══════════════════════════════════════════════════════════════════
# ATOS v2.0 — C++ Engine Configuration
# ═══════════════════════════════════════════════════════════════════

# TensorRT Engine
engine:
  path: data/yolov8_4k_optimized.engine
  input_width: 640
  input_height: 640

# Detection
detection:
  confidence_threshold: 0.20
  nms_threshold: 0.55
  max_detections: 128
  vehicle_classes: [2, 3, 5, 7]   # COCO: car, motorcycle, bus, truck

# Telemetry (UDP)
telemetry:
  target_ip: "127.0.0.1"
  target_port: 5005
  rate_hz: 10

# Signal Controller (density-threshold heuristic)
signal:
  thresholds:
    low: 5.0       # vehicles → 10s green extension
    medium: 10.0   # vehicles → 15s green extension
    high: 20.0     # vehicles → 30s green extension
    critical: 30.0 # vehicles → 45s green extension

# Anomaly Detection
anomaly:
  stall_frames: 15          # frames to check for stalled vehicle
  stall_displacement: 2.0   # pixels — below this = stalled
  trajectory_window: 50     # max trajectory history per track

# Video Source
video:
  default_source: data/test_4k_traffic.mp4
  mobile_ip: "192.168.1.7"
  mobile_port: 8080